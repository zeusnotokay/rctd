<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC THANE DOWNTOWN - Calendar</title>
  <meta name="description" content="View the meeting schedule and project calendar of Rotaract Club of Thane Downtown.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Page Hero Banner -->
  <section class="page-hero animate-fade">
    <div class="container">
      <h1 class="gradient-text">Calendar</h1>
      <p>Stay updated with our meeting timings, community events, and project schedules.</p>
    </div>
  </section>

  <!-- Calendar Container Section -->
  <section class="section-padding" style="background-color: white;">
    <div class="container">
      <div class="text-center animate-slide-up" style="max-width: 800px; margin: 0 auto 3rem auto;">
        <h2 style="font-size: 2.2rem; margin-bottom: 1.2rem;" class="gradient-text">Want to Know when do we Meet?</h2>
        <p style="font-size: 1.15rem; color: var(--text-muted);">
          We have our General Body Meeting twice a month. Get in touch with our team to know more details about physical venue locations and timings.
        </p>
      </div>

      <!-- Google Calendar iframe wrapper -->
      <div class="calendar-wrapper animate-fade">
        <div class="iframe-container">
          <iframe src="https://calendar.google.com/calendar/embed?src=a163ddf3e2040c813c09d09b4141b9ef478f0d6ee1a2d831e923e29916b33c1d%40group.calendar.google.com&ctz=Asia%2FKolkata" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>
      </div>
      
      <div class="text-center animate-slide-up" style="margin-top: 4rem;">
        <a href="contact-us.html" class="btn btn-primary">Get Venue Details</a>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="shared.js"></script>
  <script src="main.js"></script>
</body>
</html>
